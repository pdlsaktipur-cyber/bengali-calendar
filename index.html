<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>বাঙালি মাসিক ক্যালেন্ডার</title>
    <link rel="manifest" href="manifest.json">
    <style>
        html, body { overflow-x: hidden; width: 100%; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { background-color: #e0e0e0; padding: 10px; display: flex; justify-content: center; }
        .calendar-container {
            width: 100%; max-width: 450px;
            background-color: #FFFACD;
            border: 3px solid #FFA500;
            border-radius: 6px; padding: 5px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1); overflow: hidden;
        }
        .calendar-header {
            background-color: #FF6600; color: #FFFFFF;
            text-align: center; padding: 10px 5px;
            font-size: 20px; font-weight: bold;
            border-radius: 4px; margin-bottom: 5px;
            display: flex; align-items: center; justify-content: space-between;
        }
        .nav-btn {
            background: #FF0000; color: white; border: none;
            border-radius: 4px; padding: 6px 14px;
            font-size: 18px; cursor: pointer; line-height: 1; flex-shrink: 0;
        }
        .nav-btn:active { background: #D4AF37; }
        .header-title { flex: 1; text-align: center; }
        .weekdays {
            display: grid; grid-template-columns: repeat(7, 1fr);
            gap: 2px; margin-bottom: 4px;
        }
        .weekdays div {
            background-color: #009900; color: white;
            text-align: center; padding: 8px 0;
            font-weight: bold; font-size: 13px;
        }
        .weekdays div.sunday { background-color: #CC0000; }
        .days-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 2px; }

        /* Cell: flex column, top=মাসের নাম, middle=তারিখ, bottom=বাংলা তারিখ */
        .day-cell {
            background-color: #FFFFF0;
            border: 1px solid #FFD700;
            aspect-ratio: 0.85;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-between;
            padding: 2px 2px 3px 2px;
            position: relative;
        }

        /* উপরের বাম কোণে বাংলা মাসের নাম */
        .bn-month-label {
            width: 100%;
            font-size: 7.5px;
            color: #CC0000;
            font-weight: bold;
            line-height: 1;
            text-align: left;
            min-height: 9px;
        }
        /* যখন মাস নেই তখনও জায়গা ধরে রাখবে */
        .bn-month-placeholder {
            width: 100%;
            min-height: 9px;
        }

        /* মাঝে ইংরেজি তারিখ */
        .day-number {
            font-size: 18px;
            font-weight: bold;
            color: #00008B;
            line-height: 1;
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .holiday { color: #FF0000 !important; }

        /* নিচে বাংলা তারিখ */
        .sub-text {
            font-size: 9px;
            color: #555555;
            line-height: 1;
            width: 100%;
            text-align: right;
            padding-right: 2px;
        }

        .empty-cell { background-color: #F0F0F0; border: 1px solid #DDDDDD; }
        .today-cell { background-color: #FFFF00 !important; border: 2px solid #FF6600 !important; }
    </style>
</head>
<body>
<div class="calendar-container">
    <div class="calendar-header">
        <button class="nav-btn" onclick="changeMonth(-1)">&#8249;</button>
        <div class="header-title" id="header-title"></div>
        <button class="nav-btn" onclick="changeMonth(1)">&#8250;</button>
    </div>
    <div class="weekdays">
        <div class="sunday">রবি</div>
        <div>সোম</div><div>মঙ্গল</div><div>বুধ</div>
        <div>বৃহ</div><div>শুক্র</div><div>শনি</div>
    </div>
    <div class="days-grid" id="days-grid"></div>
</div>

<script>
const bnMonthNames = ['জানুয়ারী','ফেব্রুয়ারী','মার্চ','এপ্রিল','মে','জুন','জুলাই','আগস্ট','সেপ্টেম্বর','অক্টোবর','নভেম্বর','ডিসেম্বর'];
const bnCalMonths = ['বৈশাখ','জ্যৈষ্ঠ','আষাঢ়','শ্রাবণ','ভাদ্র','আশ্বিন','কার্তিক','অগ্রহায়ণ','পৌষ','মাঘ','ফাল্গুন','চৈত্র'];

function toBn(n) {
    const d = ['০','১','২','৩','৪','৫','৬','৭','৮','৯'];
    return String(n).split('').map(c => d[parseInt(c)] ?? c).join('');
}

const bnStarts = [
    [3,14],[4,16],[5,16],[6,17],[7,17],[8,17],
    [9,17],[10,16],[11,16],[0,15],[1,14],[2,15]
];

function makeStart(idx, baseYear) {
    const [m, d] = bnStarts[idx];
    const yr = (idx >= 9) ? baseYear + 1 : baseYear;
    return new Date(yr, m, d);
}

function getBengaliInfo(jsDate) {
    const y = jsDate.getFullYear();
    for (let base = y; base >= y - 1; base--) {
        for (let i = 0; i < 12; i++) {
            const start = makeStart(i, base);
            const end   = makeStart((i + 1) % 12, i === 11 ? base + 1 : base);
            if (jsDate >= start && jsDate < end) {
                return {
                    day: Math.floor((jsDate - start) / 86400000) + 1,
                    monthName: bnCalMonths[i]
                };
            }
        }
    }
    return { day: 1, monthName: '' };
}

const today = new Date();
let currentYear = today.getFullYear();
let currentMonth = today.getMonth();

function renderCalendar(year, month) {
    document.getElementById('header-title').textContent = bnMonthNames[month] + ' ' + year;
    const grid = document.getElementById('days-grid');
    grid.innerHTML = '';

    const firstDay = new Date(year, month, 1).getDay();
    const daysInMonth = new Date(year, month + 1, 0).getDate();

    for (let i = 0; i < firstDay; i++) {
        const c = document.createElement('div');
        c.className = 'day-cell empty-cell';
        grid.appendChild(c);
    }

    let prevBnMonth = '';

    for (let d = 1; d <= daysInMonth; d++) {
        const date = new Date(year, month, d);
        const isSunday = date.getDay() === 0;
        const isToday = d === today.getDate() && month === today.getMonth() && year === today.getFullYear();
        const bnInfo = getBengaliInfo(date);

        const cell = document.createElement('div');
        cell.className = 'day-cell' + (isToday ? ' today-cell' : '');

        // TOP: বাংলা মাসের নাম (শুধু যখন বদলায়)
        if (bnInfo.monthName !== prevBnMonth) {
            const mnSpan = document.createElement('div');
            mnSpan.className = 'bn-month-label';
            mnSpan.textContent = bnInfo.monthName;
            cell.appendChild(mnSpan);
            prevBnMonth = bnInfo.monthName;
        } else {
            const placeholder = document.createElement('div');
            placeholder.className = 'bn-month-placeholder';
            cell.appendChild(placeholder);
        }

        // MIDDLE: ইংরেজি তারিখ
        const num = document.createElement('div');
        num.className = 'day-number' + (isSunday ? ' holiday' : '');
        num.textContent = d;
        cell.appendChild(num);

        // BOTTOM: বাংলা তারিখ
        const sub = document.createElement('div');
        sub.className = 'sub-text';
        sub.textContent = toBn(bnInfo.day);
        cell.appendChild(sub);

        grid.appendChild(cell);
    }

    const rem = (firstDay + daysInMonth) % 7;
    if (rem !== 0) {
        for (let i = 0; i < 7 - rem; i++) {
            const c = document.createElement('div');
            c.className = 'day-cell empty-cell';
            grid.appendChild(c);
        }
    }
}

function changeMonth(dir) {
    currentMonth += dir;
    if (currentMonth > 11) { currentMonth = 0; currentYear++; }
    if (currentMonth < 0)  { currentMonth = 11; currentYear--; }
    renderCalendar(currentYear, currentMonth);
}

renderCalendar(currentYear, currentMonth);
  if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('./sw.js');
  }
</script>
</body>
</html>
